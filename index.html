<script>
    const { createApp, ref, onMounted } = Vue;

    // 1. 这里的信息是正确的
    const SUPABASE_URL = 'https://zapiekidlfpyjvlvnrhc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphcGlla2lkbGZweWp2bHZucmhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTE3NTMsImV4cCI6MjA5NjA2Nzc1M30.1QGzAJQMj45KSyiFfuP_EPNqcKgoPMQO3aplqvn1iOc';
    
    // 2. 只在这里定义一次 supabase 客户端
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    createApp({
        setup() {
            const currentTab = ref('workflow');
            const loading = ref(false);
            const config = ref({ workflow_text: '', workflow_images: [], schedules: [] });
            const logs = ref([]);
            const editLog = ref(null);
            const tabs = [
                {id:'workflow', name:'工作流程'}, 
                {id:'schedule', name:'排班计划'}, 
                {id:'logs', name:'每日记录'}, 
                {id:'issues', name:'问题汇总'}
            ];

            // 获取数据
            const fetchData = async () => {
                loading.value = true;
                try {
                    const { data: cfg } = await supabaseClient.from('project_config').select('*').eq('id', 1).single();
                    if (cfg) config.value = cfg;

                    const { data: lg } = await supabaseClient.from('daily_logs').select('*').order('date', { ascending: false });
                    logs.value = lg || [];
                } catch (err) {
                    console.error('获取数据失败:', err);
                } finally {
                    loading.value = false;
                }
            };

            // 保存配置
            const saveConfig = async () => {
                loading.value = true;
                const { error } = await supabaseClient.from('project_config').upsert({ 
                    id: 1, 
                    workflow_text: config.value.workflow_text,
                    workflow_images: config.value.workflow_images,
                    schedules: config.value.schedules
                });
                if (!error) alert('✅ 已成功保存到云端');
                else alert('保存失败: ' + error.message);
                loading.value = false;
            };

            // 上传图片
            const uploadImage = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                loading.value = true;
                const fileName = `${Date.now()}_${file.name}`;
                const { data, error } = await supabaseClient.storage.from('images').upload(fileName, file);
                if (data) {
                    const { data: { publicUrl } } = supabaseClient.storage.from('images').getPublicUrl(fileName);
                    config.value.workflow_images.push(publicUrl);
                } else {
                    alert('图片上传失败，请检查 Storage 桶 Policy 设置');
                }
                loading.value = false;
            };

            const openLog = (log = null) => {
                if (log) editLog.value = JSON.parse(JSON.stringify(log));
                else editLog.value = { date: new Date().toISOString().split('T')[0], leader: '', is_finished: false, issues: [] };
            };

            const saveLog = async () => {
                loading.value = true;
                const { error } = await supabaseClient.from('daily_logs').upsert(editLog.value);
                if (!error) {
                    editLog.value = null;
                    fetchData();
                } else {
                    alert('保存日志失败: ' + error.message);
                }
                loading.value = false;
            };

            const syncIssueStatus = async (log) => {
                await supabaseClient.from('daily_logs').update({ issues: log.issues }).eq('id', log.id);
            };

            onMounted(fetchData);

            return { tabs, currentTab, loading, config, logs, editLog, saveConfig, uploadImage, openLog, saveLog, syncIssueStatus };
        }
    }).mount('#app');
</script>
