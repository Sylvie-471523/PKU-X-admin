<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小北管理员</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        [v-cloak] { display: none; }
        .active-tab { background: #2563eb; color: white !important; border-radius: 12px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #f1f5f9; border-radius: 16px; overflow: hidden; }
        .calendar-day { background: white; min-height: 80px; padding: 6px; }
        .today { background: #fffbeb; border: 2px solid #fbbf24 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app" v-cloak>
        <div class="flex min-h-screen">
            <!-- 侧边栏 -->
            <aside class="w-64 bg-white border-r flex flex-col p-8 sticky top-0 h-screen">
                <div class="mb-12">
                    <h1 class="text-2xl font-black text-slate-800">小北管理员</h1>
                    <div class="h-1 w-10 bg-blue-600 mt-2"></div>
                </div>
                
                <nav class="flex-grow space-y-1">
                    <button v-for="t in tabs" @click="currentTab = t.id" 
                        :class="[currentTab === t.id ? 'active-tab shadow-lg shadow-blue-100' : 'text-slate-500 hover:bg-slate-50']"
                        class="w-full flex items-center space-x-3 px-4 py-3 text-sm font-bold transition-all text-left">
                        <span>{{t.icon}}</span><span>{{t.name}}</span>
                    </button>
                </nav>

                <!-- 身份设置 (模拟登录) -->
                <div class="mt-auto pt-6 border-t border-slate-100">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">当前身份 (本地记住)</label>
                    <input v-model="myIdentity" @change="saveIdentity" 
                           class="w-full mt-2 bg-slate-50 border-none p-2 rounded-lg text-sm font-bold text-blue-600 focus:ring-1 focus:ring-blue-200" 
                           placeholder="输入你的名字">
                </div>
            </aside>

            <!-- 主内容 -->
            <main class="flex-grow p-10 max-w-5xl">
                
                <!-- 1. 排班 -->
                <section v-show="currentTab === 'schedule'">
                    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100">
                        <div class="flex justify-between items-end mb-8">
                            <h2 class="text-2xl font-black text-slate-800">值班排班</h2>
                            <button @click="saveConfig" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg">保存排班表</button>
                        </div>
                        <div class="calendar-grid">
                            <div v-for="w in ['一','二','三','四','五','六','日']" class="bg-slate-50 p-2 text-center text-[10px] font-bold text-slate-400">周{{w}}</div>
                            <div v-for="day in calendarDays" :key="day.dateStr" :class="['calendar-day', day.isToday?'today':'', !day.currentMonth?'opacity-20':'']">
                                <div class="text-[10px] font-bold text-slate-300">{{day.dayNum}}</div>
                                <input v-model="config.calendar_schedule[day.dateStr]" class="w-full text-xs mt-1 border-none bg-transparent font-bold text-slate-600 p-0 focus:ring-0">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 2. 日志 (自动填名) -->
                <section v-show="currentTab === 'logs'" class="space-y-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-black text-slate-800">日志动态</h2>
                        <button @click="autoCreateLog()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-blue-100">+ 快速记今日</button>
                    </div>
                    <div v-for="log in logs" @click="openLog(log)" class="bg-white p-6 rounded-3xl border border-slate-100 hover:border-blue-400 cursor-pointer flex justify-between items-center group transition-all">
                        <div class="flex items-center space-x-6">
                            <div class="text-center bg-slate-50 px-4 py-2 rounded-2xl min-w-[60px]">
                                <div class="text-[10px] font-black text-slate-300">{{log.date.split('-')[1]}}月</div>
                                <div class="text-xl font-black text-slate-700 leading-none">{{log.date.split('-')[2]}}</div>
                            </div>
                            <div>
                                <div class="font-bold text-slate-800">{{log.leader}}</div>
                                <div class="flex space-x-2 mt-1">
                                    <span v-if="log.goodCount" class="text-[10px] bg-sky-50 text-sky-600 px-2 py-0.5 rounded-full font-bold">✨ {{log.goodCount}} 精彩留言</span>
                                    <span v-if="log.problemCount" class="text-[10px] bg-rose-50 text-rose-600 px-2 py-0.5 rounded-full font-bold">🚨 {{log.problemCount}} 问题</span>
                                </div>
                            </div>
                        </div>
                        <div v-if="log.is_finished" class="text-emerald-500 font-bold text-xs uppercase tracking-widest">已审</div>
                    </div>
                </section>

                <!-- 3. 手册与汇总 (略，代码逻辑一致) -->
                <section v-show="currentTab === 'workflow'">
                    <!-- ... 这里保留之前的工作流程和名单代码 ... -->
                    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-100">
                        <div class="flex justify-between mb-8"><h2 class="text-2xl font-black">手册 & 名单</h2><button @click="saveConfig" class="text-blue-600 font-bold">保存修改</button></div>
                        <textarea v-model="config.workflow_text" class="w-full bg-slate-50 border-none p-4 h-32 rounded-2xl mb-6"></textarea>
                        <div class="grid grid-cols-2 gap-6">
                            <div class="p-6 bg-blue-50/50 rounded-3xl border border-blue-100"><label class="text-xs font-bold text-blue-800 mb-2 block">🌟 积极用户</label><textarea v-model="config.active_users" class="w-full bg-transparent border-none h-24 text-sm"></textarea></div>
                            <div class="p-6 bg-rose-50/50 rounded-3xl border border-rose-100"><label class="text-xs font-bold text-rose-800 mb-2 block">🚨 问题用户</label><textarea v-model="config.problem_users" class="w-full bg-transparent border-none h-24 text-sm"></textarea></div>
                        </div>
                    </div>
                </section>

                <section v-show="currentTab === 'summary'">
                    <div class="grid grid-cols-2 gap-10">
                        <div class="space-y-4"><h3 class="font-black text-rose-500 text-sm tracking-widest">🚨 问题汇总</h3>
                            <div v-for="p in allIssues.filter(i => i.type === 'problem')" class="bg-white p-5 rounded-2xl border border-rose-50 text-sm shadow-sm"><p class="font-bold text-slate-400 mb-1">{{p.date}} {{p.leader}}</p>{{p.content}}</div>
                        </div>
                        <div class="space-y-4"><h3 class="font-black text-sky-600 text-sm tracking-widest">✨ 精彩留言</h3>
                            <div v-for="g in allIssues.filter(i => i.type === 'good')" class="bg-white p-5 rounded-2xl border border-sky-50 text-sm shadow-sm italic"><p class="font-bold text-slate-400 mb-1">{{g.date}} {{g.leader}}</p>“{{g.content}}”</div>
                        </div>
                    </div>
                </section>

                <!-- 日志弹窗 -->
                <div v-if="editLog" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
                    <div class="bg-white p-12 rounded-[48px] w-full max-w-xl shadow-2xl overflow-y-auto max-h-[85vh]">
                        <div class="flex justify-between mb-8"><h3 class="text-2xl font-black">工作日志记录</h3><button @click="editLog=null" class="text-2xl">✕</button></div>
                        <div class="grid grid-cols-2 gap-6 mb-6">
                            <div><label class="text-[10px] font-bold text-slate-300 ml-1">负责日期</label><input type="date" v-model="editLog.date" class="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold mt-1"></div>
                            <div><label class="text-[10px] font-bold text-slate-300 ml-1">负责人</label><input type="text" v-model="editLog.leader" class="w-full bg-slate-50 border-none p-4 rounded-2xl font-bold mt-1"></div>
                        </div>
                        <label class="flex items-center space-x-3 mb-8 p-5 bg-emerald-50 rounded-3xl cursor-pointer">
                            <input type="checkbox" v-model="editLog.is_finished" class="w-5 h-5 accent-emerald-600">
                            <span class="font-black text-emerald-700">任务已全部核对并完成 (不勾选会收到催促提醒)</span>
                        </label>
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between font-black text-sm uppercase">详情列表 <button @click="editLog.issues.push({type:'problem', content:'', status:'未讨论'})" class="text-blue-600 text-xs">+ 新增</button></div>
                            <div v-for="(iss, i) in editLog.issues" :key="i" class="flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl">
                                <select v-model="iss.type" class="bg-white text-[10px] font-bold border-none rounded-lg p-2 outline-none"><option value="problem">🚨 问题</option><option value="good">✨ 留言</option></select>
                                <input v-model="iss.content" placeholder="详情描述..." class="bg-transparent border-b border-slate-200 flex-grow text-sm font-bold outline-none">
                                <button @click="editLog.issues.splice(i,1)" class="text-slate-300">✕</button>
                            </div>
                        </div>
                        <button @click="saveLog" class="w-full bg-blue-600 text-white py-5 rounded-[24px] font-black shadow-xl shadow-blue-100">保存同步</button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const S_URL = 'https://zapiekidlfpyjvlvnrhc.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphcGlla2lkbGZweWp2bHZucmhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTE3NTMsImV4cCI6MjA5NjA2Nzc1M30.1QGzAJQMj45KSyiFfuP_EPNqcKgoPMQO3aplqvn1iOc';
        const client = supabase.createClient(S_URL, S_KEY);

        createApp({
            setup() {
                const currentTab = ref('schedule');
                const loading = ref(false);
                const myIdentity = ref(localStorage.getItem('my_name') || '');
                const config = ref({ workflow_text:'', workflow_images:[], calendar_schedule:{}, active_users:'', problem_users:'' });
                const logs = ref([]);
                const editLog = ref(null);
                const tabs = [{id:'schedule', name:'日历排班', icon:'📅'}, {id:'workflow', name:'手册名单', icon:'📚'}, {id:'logs', name:'日志记录', icon:'🖋️'}, {id:'summary', name:'成果汇总', icon:'📊'}];

                const calendarDays = computed(() => {
                    const now = new Date(); const year = now.getFullYear(); const month = now.getMonth();
                    const firstDay = new Date(year, month, 1); const lastDay = new Date(year, month + 1, 0);
                    let startDay = firstDay.getDay() || 7; const days = [];
                    for(let i=startDay-1; i>0; i--) { const d=new Date(year, month, 1-i); days.push({ dayNum: d.getDate(), dateStr: d.toISOString().split('T')[0], currentMonth: false }); }
                    for(let i=1; i<=lastDay.getDate(); i++) { const dStr=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`; days.push({ dayNum: i, dateStr: dStr, currentMonth: true, isToday: dStr === new Date().toISOString().split('T')[0] }); }
                    return days;
                });

                const allIssues = computed(() => {
                    const list = [];
                    logs.value.forEach(l => { if(l.issues) l.issues.forEach(i => list.push({ ...i, date: l.date, leader: l.leader })); });
                    return list;
                });

                const saveIdentity = () => localStorage.setItem('my_name', myIdentity.value);

                const autoCreateLog = () => {
                    const today = new Date().toISOString().split('T')[0];
                    const dutyName = config.value.calendar_schedule[today] || '';
                    editLog.value = { 
                        date: today, 
                        leader: myIdentity.value || dutyName || '未知负责人', 
                        is_finished: false, 
                        issues: [] 
                    };
                };

                const fetchData = async () => {
                    loading.value = true;
                    const { data: c } = await client.from('project_config').select('*').eq('id', 1).single();
                    if(c) config.value = { ...config.value, ...c, calendar_schedule: c.calendar_schedule || {} };
                    const { data: l } = await client.from('daily_logs').select('*').order('date', {ascending:false});
                    logs.value = (l || []).map(item => ({ ...item, goodCount: item.issues?.filter(i => i.type === 'good').length || 0, problemCount: item.issues?.filter(i => i.type === 'problem').length || 0 }));
                    loading.value = false;
                };

                const saveConfig = async () => {
                    loading.value = true;
                    await client.from('project_config').upsert({ id: 1, ...config.value });
                    alert('✅ 同步成功');
                    loading.value = false;
                };

                const openLog = (l) => { editLog.value = JSON.parse(JSON.stringify(l)); };
                const saveLog = async () => {
                    loading.value = true;
                    await client.from('daily_logs').upsert(editLog.value);
                    editLog.value = null; fetchData();
                };

                onMounted(fetchData);
                return { currentTab, tabs, loading, myIdentity, config, logs, editLog, calendarDays, allIssues, saveIdentity, autoCreateLog, saveConfig, openLog, saveLog };
            }
        }).mount('#app');
    </script>
</body>
</html>
